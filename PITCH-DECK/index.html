<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PGM Defense Deck</title>
<script src="lib/lucide.min.js"></script>
<style>
/* ============ FONTS (bundled, work offline) ============ */
@font-face{font-family:'Space Grotesk';src:url('fonts/spacegrotesk-latin.woff2') format('woff2');font-weight:300 700;font-display:swap}
@font-face{font-family:'Inter';src:url('fonts/inter-latin.woff2') format('woff2');font-weight:100 900;font-display:swap}

/* ============ TOKENS ============ */
:root{
  --green-900:#073626; --green-700:#0c5038; --green-600:#2f7d3f; --green-500:#65B340;
  --green-300:#9FDB7E; --green-050:#eef6ec;
  --ink:#16201c; --muted:#5d6b64; --line:#e3e8e4; --bg:#fff; --paper:#f6f8f6;
  --amber:#E8A33D; --amber-d:#b9772a; --red:#D6543F; --blue:#3E78C2; --violet:#7C5CCB;
  --shadow-sm:0 2px 8px rgba(7,54,38,.06);
  --shadow-md:0 14px 40px -12px rgba(7,54,38,.22);
  --shadow-lg:0 30px 70px -20px rgba(7,54,38,.34);
  --display:'Space Grotesk',-apple-system,system-ui,sans-serif;
  --body:'Inter',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);color:var(--ink);background:#0a0f0c;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ============ DECK / SLIDE ============ */
#deck{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.stage{position:relative;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh;background:var(--bg);overflow:hidden;box-shadow:0 0 120px rgba(0,0,0,.5);font-size:clamp(10px,1.32vw,19px)}
.slide{position:absolute;inset:0;padding:4.6% 6% 7%;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateX(38px);transition:opacity .5s ease,transform .55s cubic-bezier(.22,.61,.36,1),visibility .55s;background:var(--bg)}
.slide.active{opacity:1;visibility:visible;transform:translateX(0);z-index:2}
.slide.prev{transform:translateX(-38px)}
.slide .body{flex:1;display:flex;flex-direction:column;min-height:0}

/* ============ TYPE ============ */
.kicker{display:inline-flex;align-items:center;gap:.5em;font-family:var(--display);font-weight:600;font-size:.78em;letter-spacing:.16em;text-transform:uppercase;color:var(--green-500)}
.kicker::before{content:"";width:1.7em;height:2px;background:var(--green-500);border-radius:2px}
.cover .kicker::after{content:"";width:1.7em;height:2px;background:var(--green-500);border-radius:2px}
h1.title{font-family:var(--display);font-weight:700;color:var(--green-900);line-height:1.06;letter-spacing:-.015em}
h2.head{font-family:var(--display);font-weight:700;color:var(--green-900);font-size:2.1em;line-height:1.08;letter-spacing:-.01em;margin:.18em 0 .1em}
.subhead{color:var(--muted);font-size:1.02em;max-width:46em}

/* ============ FOOTER + NUM ============ */
.footer{position:absolute;left:6%;right:6%;bottom:2.6%;display:flex;justify-content:space-between;align-items:center;font-size:.74em;color:#9aa8a0;letter-spacing:.02em;border-top:1px solid var(--line);padding-top:.7em;z-index:5}
.footer .brand{font-family:var(--display);font-weight:600;color:var(--green-700)}
.footer .brand span{color:var(--green-500)}

/* ============ COMPONENTS ============ */
.pill{display:inline-flex;align-items:center;gap:.4em;padding:.32em .75em;border-radius:999px;font-size:.82em;font-weight:600;background:var(--green-050);color:var(--green-700)}
.card{background:var(--bg);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm)}
.statnum{font-family:var(--display);font-weight:700;color:var(--green-900);line-height:1;letter-spacing:-.02em}
.statlabel{font-size:.8em;color:var(--muted);margin-top:.35em;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.k{color:var(--green-600);font-weight:700}
b.kk{color:var(--green-900)}
.hl{background:linear-gradient(transparent 58%,var(--green-300) 58%);padding:0 .12em;font-weight:700}

/* icon chips */
.lucide{stroke-width:2}
.ic{flex:none;width:1.75em;height:1.75em;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;background:var(--green-050);color:var(--green-700)}
.ic svg{width:1em;height:1em}
.ic.amber{background:#fdf3e6;color:var(--amber-d)} .ic.red{background:#fbeaea;color:#c0412e}
.ic.blue{background:#e9f1fb;color:#356bb0} .ic.violet{background:#efeafb;color:#6a4dbf}
.ic.dark{background:var(--green-900);color:#fff}
.li{display:flex;gap:.7em;align-items:flex-start}
ul.icons{list-style:none;display:flex;flex-direction:column;gap:.85em}
.ic.glass{background:rgba(255,255,255,.18);color:#fff}

/* photo cards (problem slide) */
.probcard{position:relative;overflow:hidden;border:0;color:#e9f3ed;box-shadow:var(--shadow-md)}
.probimg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.02)}
.proboverlay{position:absolute;inset:0}
.probcard .pc-body{position:relative;z-index:2;padding:1.5em 1.65em}
.pill.glass{background:rgba(255,255,255,.18);color:#fff;backdrop-filter:blur(2px)}

/* mac window */
.media{text-align:center}
.window{display:inline-block;max-width:100%;border-radius:13px;overflow:hidden;background:#fff;box-shadow:var(--shadow-lg);border:1px solid #dfe5e0;vertical-align:top}
.titlebar{height:2.3em;background:linear-gradient(#fbfcfb,#eef1ee);border-bottom:1px solid #e2e7e3;display:flex;align-items:center;padding:0 1em;gap:.55em}
.lights{display:flex;gap:.5em}
.lights i{width:.78em;height:.78em;border-radius:50%;display:block}
.lights .r{background:#ff5f57}.lights .y{background:#febc2e}.lights .g{background:#28c840}
.titlebar .addr{flex:1;text-align:center;font-size:.74em;color:#8b988f;font-weight:500;font-family:var(--display)}
.window img{display:block;width:auto;height:auto;max-width:100%;max-height:54vh}
.window.tall img{max-height:62vh}

/* tables */
table.tbl{width:100%;border-collapse:collapse;font-size:.92em}
table.tbl th{font-family:var(--display);text-align:left;color:var(--green-900);font-weight:600;font-size:.82em;text-transform:uppercase;letter-spacing:.05em;padding:.55em .7em;border-bottom:2px solid var(--line)}
table.tbl td{padding:.55em .7em;border-bottom:1px solid var(--line)}
table.tbl tr.win td{background:var(--green-050)}
table.tbl tr.win td:first-child{font-weight:700;color:var(--green-900)}
.tag{font-size:.72em;font-weight:700;padding:.18em .55em;border-radius:6px}
.tag.api{background:#e7f0fb;color:var(--blue)}.tag.local{background:#f1eefb;color:var(--violet)}
.mono{font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:.92em;color:var(--green-700)}

/* code */
.code{font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:.82em;background:#0d1f17;color:#cfe8d6;border-radius:12px;padding:1.1em 1.3em;line-height:1.65;box-shadow:var(--shadow-md);white-space:pre;overflow:hidden}
.code .key{color:var(--green-300)}.code .str{color:#ffd9a0}.code .num{color:#9ad7ff}.code .bool{color:#ff9d8a}

/* grids/rows */
.row{display:flex;gap:1.1em}.col{flex:1;min-width:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.1em}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1em}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:.9em}
.flowarrow{color:var(--green-500);display:flex;align-items:center;font-size:1.2em}
.stepbadge{width:2.4em;height:2.4em;border-radius:11px;background:var(--green-900);color:#fff;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:1.15em;flex:none}
/* pipeline corner number */
.pcard{position:relative}
.pnum{position:absolute;top:.55em;left:.65em;width:1.6em;height:1.6em;border-radius:7px;background:var(--green-900);color:#fff;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:.78em;z-index:2}
/* agenda */
.agnum{flex:none;width:2.2em;height:2.2em;border-radius:10px;background:var(--green-900);color:var(--green-300);display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:1em}
/* toolbox concept cards (image on top) */
.concept{padding:0;overflow:hidden;display:flex;flex-direction:column}
.cimg{height:6.4em;background:#f4f7f4;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);padding:.45em}
.cimg img{max-height:100%;max-width:100%;object-fit:contain;display:block}
.cbody{padding:.85em 1.05em}

/* model blocks (frozen backbone) */
.blk{flex:1;border-radius:10px;padding:.7em .4em;text-align:center;font-size:.78em;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:.35em;border:1.5px solid}
.blk.frozen{background:#f1f3f1;border-color:#d8ded9;color:#8a958e}
.blk.train{background:var(--green-050);border-color:var(--green-300);color:var(--green-700)}
.blk.newhead{background:var(--green-900);border-color:var(--green-900);color:#fff}
.blk svg{width:1.05em;height:1.05em}
.stagerow{display:flex;align-items:center;gap:1em}
.stagetag{width:8.5em;flex:none}

/* cover */
.cover{justify-content:center;text-align:center;align-items:center;background:radial-gradient(1200px 520px at 50% -8%,#f0f8ee 0%,rgba(255,255,255,0) 60%),radial-gradient(900px 600px at 110% 120%,#eaf5e4 0%,rgba(255,255,255,0) 55%),#fff}
.cover .ulogo{position:absolute;top:4.5%;width:8.4%;height:auto}
.ulogo.left{left:5.5%}.ulogo.right{right:5.5%}
.cover .legal{position:absolute;top:5%;left:17%;right:17%;text-align:center;font-size:.92em;color:#6c7a72;line-height:1.65}
.cover .legal b{color:var(--green-900);font-weight:600}

/* thank-you marquee */
.thanks{justify-content:center}
.marquee{position:relative;width:100%;margin-top:2.4em;overflow:hidden;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);
  mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)}
.mtrack{display:flex;width:max-content;animation:marq 52s linear infinite}
.marquee:hover .mtrack{animation-play-state:paused}
@keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mq{flex:none;margin-right:1.3em;border-radius:13px;overflow:hidden;box-shadow:var(--shadow-md);border:1px solid #e2e7e3;background:#fff}
.mq img{display:block;height:27vh;width:auto}

/* nav */
#progress{position:fixed;top:0;left:0;height:3px;background:var(--green-500);z-index:50;transition:width .45s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px var(--green-300)}
#dots{position:fixed;bottom:13px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:6px;padding:7px 12px;background:rgba(10,15,12,.45);border-radius:999px;backdrop-filter:blur(8px)}
#dots button{width:7px;height:7px;border-radius:50%;border:0;padding:0;cursor:pointer;background:rgba(255,255,255,.35);transition:all .3s}
#dots button.on{background:var(--green-300);width:19px;border-radius:4px}
#hint{position:fixed;bottom:15px;right:18px;z-index:50;color:rgba(255,255,255,.5);font-size:11px}

/* ============ STAGGERED ANIMATION ============ */
.slide.active [data-rise]{animation:rise .6s cubic-bezier(.2,.7,.25,1) backwards;animation-delay:var(--d,0ms)}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.slide.active [data-pop]{animation:pop .52s cubic-bezier(.2,1.25,.4,1) backwards;animation-delay:var(--d,0ms)}
@keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.slide.active [data-fade]{animation:fade .65s ease backwards;animation-delay:var(--d,0ms)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.slide.active [data-grow]{animation:grow .9s cubic-bezier(.2,.8,.2,1) backwards;animation-delay:var(--d,0ms);transform-origin:left center}
@keyframes grow{from{transform:scaleX(0);opacity:.4}to{transform:scaleX(1);opacity:1}}
</style>
</head>
<body>
<div id="progress"></div>
<div id="deck"><div class="stage" id="stage"></div></div>
<div id="dots"></div>
<div id="hint">← → or Space · F fullscreen</div>

<template id="slides">

<!-- 1 · COVER -->
<section class="slide cover">
  <img class="ulogo left" data-fade src="images/usthb.png" alt="USTHB">
  <img class="ulogo right" data-fade src="images/usthb.png" alt="USTHB">
  <div class="legal" data-fade>
    People's Democratic Republic of Algeria · Ministry of Higher Education and Scientific Research<br>
    <b>University of Science and Technology Houari Boumediene</b><br>
    Faculty of Computer Science · Department of Artificial Intelligence &amp; Data Science
  </div>
  <img data-pop src="images/logo.svg" alt="PGM-Lab" style="height:3.1em;margin-bottom:1.3em">
  <div class="kicker" data-rise style="justify-content:center;font-size:.92em">Master's Thesis Defense · Bioinformatics</div>
  <h1 class="title" data-rise style="font-size:4.3em;margin:.3em 0 .2em;max-width:14em">Intelligent Health Monitor<br>for Medicinal Plants</h1>
  <div data-rise style="font-family:var(--display);font-size:1.5em;color:var(--green-500);font-weight:600">PGM · Proactive Growth Monitoring</div>
  <div data-fade style="position:absolute;left:0;right:0;bottom:5.5%;text-align:center">
    <div class="row" style="justify-content:center;gap:3.6em;font-size:1.06em">
      <div><div style="color:var(--muted);font-size:.72em;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3em">Presented by</div><b class="kk">Oussama MEKHALDI</b> &nbsp;·&nbsp; <b class="kk">Hichem MABED</b></div>
      <div><div style="color:var(--muted);font-size:.72em;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3em">Supervisor</div><b class="kk">Dr. Naila Aziza HOUACINE</b></div>
    </div>
    <div style="margin-top:1em;color:var(--muted);font-size:.92em">Jury &nbsp;·&nbsp; Dr. Hiba BELHADI &nbsp;·&nbsp; Dr. Fatima Zohra MEKAHLIA</div>
    <div style="margin-top:.45em;color:#9aa8a0;font-size:.84em">Academic year 2025 / 2026 &nbsp;·&nbsp; June 2026</div>
  </div>
</section>

<!-- 2 · AGENDA -->
<section class="slide">
  <div class="kicker" data-rise>Agenda</div>
  <h2 class="head" data-rise>What we will cover</h2>
  <div class="body" style="justify-content:center">
    <div style="display:flex;flex-direction:column;gap:.75em">
      <div class="card li" data-rise style="padding:1em 1.3em;align-items:center;gap:1.1em"><span class="agnum">01</span><div><b class="kk" style="font-size:1.1em;font-family:var(--display)">Introduction</b><span style="color:var(--muted);margin-left:.6em">Context · Problem · Goals</span></div></div>
      <div class="card li" data-rise style="padding:1em 1.3em;align-items:center;gap:1.1em"><span class="agnum">02</span><div><b class="kk" style="font-size:1.1em;font-family:var(--display)">Methodology</b><span style="color:var(--muted);margin-left:.6em">Toolkit · General pipeline</span></div></div>
      <div class="card li" data-rise style="padding:1em 1.3em;align-items:center;gap:1.1em;border-left:4px solid var(--green-500)"><span class="agnum">03</span><div><b class="kk" style="font-size:1.1em;font-family:var(--display)">The pipeline · 6 steps</b><span style="color:var(--muted);margin-left:.6em">Detection · Classification · Context · Decision · Evaluation · Actuation</span></div></div>
      <div class="card li" data-rise style="padding:1em 1.3em;align-items:center;gap:1.1em"><span class="agnum">04</span><div><b class="kk" style="font-size:1.1em;font-family:var(--display)">System &amp; Results</b><span style="color:var(--muted);margin-left:.6em">Dashboard · IoT · History · Proven numbers</span></div></div>
      <div class="card li" data-rise style="padding:1em 1.3em;align-items:center;gap:1.1em"><span class="agnum">05</span><div><b class="kk" style="font-size:1.1em;font-family:var(--display)">Conclusion &amp; Perspectives</b></div></div>
    </div>
  </div>
  <div class="footer"><span class="brand">PGM <span>·</span> Intelligent Health Monitor</span><span class="pageno"></span></div>
</section>

<!-- 3 · CONTEXT -->
<section class="slide">
  <div class="kicker" data-rise>Introduction : Context</div>
  <h2 class="head" data-rise>Why monitor medicinal plants?</h2>
  <div class="body">
    <div class="row" style="flex:1;align-items:center;gap:2.2em">
      <div class="col" style="display:flex;flex-direction:column;gap:1em">
        <div class="card li" data-rise style="padding:1.05em 1.25em;border-left:4px solid var(--green-700)"><span class="ic"><i data-lucide="gem"></i></span><div><b class="kk">Quality-sensitive crops.</b> Their chemical value depends on growing conditions, so they are grown in controlled labs and chambers.</div></div>
        <div class="card li" data-rise style="padding:1.05em 1.25em;border-left:4px solid var(--green-500);background:var(--green-050)"><span class="ic" style="background:var(--green-500);color:#fff"><i data-lucide="activity"></i></span><div><b class="kk">The first signal is in the data, not the leaf.</b> Sensor patterns (temperature, humidity, soil, pH) shift before any visible symptom, so we can predict stress early.</div></div>
        <div class="card li" data-rise style="padding:1.05em 1.25em;border-left:4px solid var(--amber)"><span class="ic amber"><i data-lucide="leaf"></i></span><div><b class="kk">By the time it is visible, it is late.</b> Chlorosis, necrosis and wilting mean quality is already dropping.</div></div>
        <div class="card li" data-rise style="padding:1.05em 1.25em;border-left:4px solid var(--red)"><span class="ic red"><i data-lucide="user-x"></i></span><div><b class="kk">Manual monitoring fails.</b> It is not continuous and not scalable: no human watches every leaf all day.</div></div>
      </div>
      <div class="col media" data-pop style="flex:.95">
        <div class="window tall"><div class="titlebar"><div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div><div class="addr">PGM growth chamber · concept</div></div><img src="images/pgm_concept.png" alt="chamber"></div>
      </div>
    </div>
  </div>
  <div class="footer"><span class="brand">PGM <span>·</span> Intelligent Health Monitor</span><span class="pageno"></span></div>
</section>

<!-- 4 · PROBLEM -->
<section class="slide">
  <div class="kicker" data-rise>Introduction : Problem</div>
  <h2 class="head" data-rise>No existing integrated solution</h2>
  <div class="body">
    <div class="grid2" style="flex:1;align-content:center;gap:1.6em">
      <div class="card probcard" data-rise>
        <div class="probimg" style="background-image:url(images/prob_agro.png)"></div>
        <div class="proboverlay" style="background:linear-gradient(155deg,rgba(7,54,38,.80),rgba(7,54,38,.93))"></div>
        <div class="pc-body">
          <div class="pill glass"><i data-lucide="sprout"></i> Agronomic challenges</div>
          <ul class="icons" style="margin-top:1em">
            <li class="li"><span class="ic glass"><i data-lucide="circle-help"></i></span><div><b style="color:#fff">Symptom ambiguity:</b> same look, different causes</div></li>
            <li class="li"><span class="ic glass"><i data-lucide="microscope"></i></span><div><b style="color:#fff">Early symptoms are subtle:</b> easy to miss</div></li>
            <li class="li"><span class="ic glass"><i data-lucide="thermometer"></i></span><div><b style="color:#fff">Environmental variability:</b> constant change</div></li>
          </ul>
        </div>
      </div>
      <div class="card probcard" data-rise>
        <div class="probimg" style="background-image:url(images/prob_tech.png)"></div>
        <div class="proboverlay" style="background:linear-gradient(155deg,rgba(8,28,52,.78),rgba(6,15,32,.93))"></div>
        <div class="pc-body">
          <div class="pill glass"><i data-lucide="cpu"></i> Technical challenges</div>
          <ul class="icons" style="margin-top:1em">
            <li class="li"><span class="ic glass"><i data-lucide="database"></i></span><div><b style="color:#fff">Almost no labeled stress data</b> for medicinal species</div></li>
            <li class="li"><span class="ic glass"><i data-lucide="shuffle"></i></span><div><b style="color:#fff">Domain shift:</b> lab and field images differ</div></li>
            <li class="li"><span class="ic glass"><i data-lucide="scale"></i></span><div><b style="color:#fff">Class imbalance</b> up to <span style="background:var(--green-300);color:var(--green-900);padding:.06em .42em;border-radius:5px;font-weight:700">41.8×</span></div></li>
            <li class="li"><span class="ic glass"><i data-lucide="bot"></i></span><div><b style="color:#fff">LLM hallucination</b> · edge compute limits</div></li>
          </ul>
        </div>
      </div>
    </div>
    <div data-pop style="margin-top:1.2em;background:var(--green-900);color:#fff;border-radius:14px;padding:1em 1.4em;font-size:1.02em;box-shadow:var(--shadow-md)">
      Existing tools are <b style="color:var(--green-300)">vision-only · species-specific · no reasoning · no actuation</b>. &nbsp;We need a complete <b style="color:var(--green-300)">closed loop</b>.
    </div>
  </div>
  <div class="footer"><span class="brand">PGM <span>·</span> Intelligent Health Monitor</span><span class="pageno"></span></div>
</section>

<!-- 5 · GOALS -->
<section class="slide">
  <div class="kicker" data-rise>Introduction : Goals</div>
  <h2 class="head" data-rise>Four verbs, one closed loop</h2>
  <div class="body">

<script>
(function(){
  const stage=document.getElementById('stage');
  const slides=Array.from(document.getElementById('slides').content.querySelectorAll('.slide'));
  slides.forEach(s=>stage.appendChild(s));
  if(window.lucide) lucide.createIcons();

  const total=slides.length;
  slides.forEach((s,k)=>{const n=s.querySelector('.pageno'); if(n) n.textContent=String(k+1).padStart(2,'0')+' / '+total;});

  slides.forEach(s=>{
    const els=Array.from(s.querySelectorAll('[data-rise],[data-pop],[data-fade],[data-grow]'));
    const step=Math.min(85, Math.max(45, Math.round(620/Math.max(els.length,1))));
    els.forEach((el,idx)=>el.style.setProperty('--d',(idx*step)+'ms'));
  });

  const dotsWrap=document.getElementById('dots'), progress=document.getElementById('progress');
  const _p=new URLSearchParams(location.search).get('start');
  let i=_p?Math.max(0,Math.min(slides.length-1,parseInt(_p,10)-1)):0;

  slides.forEach((_,k)=>{const b=document.createElement('button');b.addEventListener('click',e=>{e.stopPropagation();go(k);});dotsWrap.appendChild(b);});
  const dots=Array.from(dotsWrap.children);

  function render(){
    slides.forEach((s,k)=>{s.classList.toggle('active',k===i);s.classList.toggle('prev',k<i);});
    dots.forEach((d,k)=>d.classList.toggle('on',k===i));
    progress.style.width=((i)/(slides.length-1))*100+'%';
  }
  function go(n){i=Math.max(0,Math.min(slides.length-1,n));render();}
  function next(){go(i+1);} function prev(){go(i-1);}

  document.addEventListener('keydown',e=>{
    if(['ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();next();}
    else if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();prev();}
    else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(slides.length-1);}
    else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  });
  stage.addEventListener('click',e=>{if(e.target.closest('a'))return;const r=stage.getBoundingClientRect();(e.clientX-r.left>r.width/2)?next():prev();});
  render();
})();
</script>
